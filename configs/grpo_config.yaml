model_id: "lerobot/smolvla_libero"
task_suite: "libero_10"

# GRPO hyperparameters
n_group: 8
clip_eps: 0.2
kl_coeff: 0.01
denoising_weights:
  8: 0.1
  9: 0.2
  10: 0.7

# Optimizer
learning_rate_backbone: 1.0e-5
learning_rate_head: 1.0e-4
grad_clip_norm: 1.0

# Training schedule
total_steps: 5000
eval_every: 500
save_every: 1000
n_eval_episodes: 20

# Output
output_dir: "./checkpoints/grpo_smolvla"
log_dir: "./runs/grpo_smolvla"
