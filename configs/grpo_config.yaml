model_id: "lerobot/smolvla_libero"
task_suite: "libero_10"

# GRPO hyperparameters
n_group: 4  # bumped from 4 — more init-state diversity → fewer uniform-reward skips
clip_eps: 0.2
kl_coeff: 0.01
# Multi-denoise weighted reward: each group member is rolled out 3× in the sim,
# one per denoising-step budget below, and the rewards are combined as a weighted
# sum. All three integrations reach t=0 from the same noise; they differ only in
# Euler discretization error (step size = 1/N).
#   N=10 (step 0.10): canonical inference (SmolVLA default) — full weight.
#   N=8  (step 0.125): mild discretization error — modest regularizer.
#   N=5  (step 0.20):  coarse discretization error — exposes brittleness in the
#                       learned flow field, gives reward-signal diversity.
# Members where the policy succeeds even at N=5 earn full credit (1.0); members
# that only survive at N=10 earn partial credit (0.7).
denoising_weights:
  5: 0.1
  8: 0.2
  10: 0.7

# Optimizer (lowered 100× from initial 1e-5 / 1e-4 to avoid single-step policy collapse
# from negative-advantage gradients pushing AWAY from bad trajectories)
learning_rate_backbone: 1.0e-7
learning_rate_head: 1.0e-6
grad_clip_norm: 1.0

# Training schedule
total_steps: 5000
eval_every: 500
save_every: 1000
n_eval_episodes: 10

# Cap rollout horizon for TRAINING only (eval still uses env._max_episode_steps = 520).
# Most successful LIBERO rollouts terminate well before 300; failures past that
# burn rollout time with no learning signal.
max_episode_steps_train: 300

# Init-state split (Option A: train on [0..n_train_init_states-1], eval on the rest)
n_train_init_states: 40

# Parallel rollout: spawns n_group worker processes that each hold a LiberoEnv.
# Gives ~n_group× wall-clock speedup on env-bound rollout phase. Requires enough
# CPU cores (n_group + 1) and ~1.5GB RAM per worker. Recommended on Vast.ai.
use_parallel_rollout: true

# Output
output_dir: "./checkpoints/grpo_smolvla"
log_dir: "./runs/grpo_smolvla"
