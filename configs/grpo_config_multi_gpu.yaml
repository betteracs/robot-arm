model_id: "lerobot/smolvla_libero"
task_suite: "libero_10"

n_group: 4
clip_eps: 0.2
kl_coeff: 0.01

denoising_weights:
  5: 0.1
  8: 0.2
  10: 0.7

learning_rate_backbone: 1.0e-7
learning_rate_head: 1.0e-6
grad_clip_norm: 1.0

total_steps: 5000
eval_every: 500
save_every: 1000
n_eval_episodes: 10

max_episode_steps_train: 300
n_train_init_states: 40

# Multi-GPU: 4 GPUs required (rank 0 = trainer, ranks 1-3 = rollout workers)
use_multi_gpu_rollout: true
dist_master_addr: "127.0.0.1"
dist_master_port: 29500

output_dir: "./checkpoints/grpo_smolvla_multigpu"
log_dir: "./runs/grpo_smolvla_multigpu"
