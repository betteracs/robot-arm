model_id: "lerobot/smolvla_libero"
task_suite: "libero_10"
num_envs: 32
device: "cuda:0"
headless: true

# GRPO hyperparameters
n_group: 4
clip_eps: 0.2
kl_coeff: 0.01

# Optimizer
learning_rate_backbone: 1.0e-5
learning_rate_head: 1.0e-4

# Training schedule
total_steps: 5000
save_every: 1000

# Output
output_dir: "./checkpoints/grpo_isaac"
